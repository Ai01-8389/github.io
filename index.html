            attribution: '&copy; OpenStreetMap &copy; CARTO',
            subdomains: 'abcd',
            maxZoom: 19
        }).addTo(map);

        // 3. 坐标转换工具函数 (处理度分秒格式)
        function parseCoordinate(coordStr) {
            if (!coordStr || typeof coordStr !== 'string') return null;
            
            // 清理字符串，移除空格
            let str = coordStr.trim();
            
            // 尝试匹配多种格式：39°28′47.801″ 或 39 度 28 分 47.801 秒 或 39°11'22.720"
            // 统一替换分隔符
            str = str.replace(/度/g, '°').replace(/分/g, '′').replace(/秒/g, '″');
            str = str.replace(/'/g, '′').replace(/"/g, '″'); // 处理英文引号
            
            const degMatch = str.match(/(\d+)\s*°/);
            const minMatch = str.match(/(\d+)\s*′/);
            const secMatch = str.match(/(\d+(?:\.\d+)?)\s*″/);

            if (degMatch && minMatch && secMatch) {
                const deg = parseFloat(degMatch[1]);
                const min = parseFloat(minMatch[1]);
                const sec = parseFloat(secMatch[1]);
                return deg + (min / 60) + (sec / 3600);
            }
            
            // 如果已经是数字

            if (!isNaN(num)) return num;

            return null;
        }

        document.getElementById('total-count').innerText = rawData.length;

        const companyListEl = document.getElementById('company-list');
        const markers = [];

        // 渲染函数
        function renderList(data) {
            companyListEl.innerHTML = '';
            markers.forEach(m => map.removeLayer(m));
            markers.length = 0;

            if(data.length === 0) {
                companyListEl.innerHTML = '<div class="text-center text-gray-400 text-sm py-8"><i class="fa-regular fa-folder-open mb-2 text-2xl"></i><br>未找到相关企业</div>';
                return;
            }

            data.forEach((item) => {
                // 创建列表项
                const li = document.createElement('div');
                li.className = "p-3 hover:bg-blue-50 rounded-lg cursor-pointer transition-all border border-transparent hover:border-blue-100 group";
                li.innerHTML = `
                    <div class="font-medium text-gray-700 group-hover:text-blue-700 text-sm truncate">${item.name}</div>
                    <div class="flex gap-1 mt-2 flex-wrap">
                        ${item.pollutants.map(p => `<span class="pollutant-tag tag-${p}">${p}</span>`).join('')}
                    </div>
                `;
                
                li.addEventListener('click', () => {
                    map.flyTo([item.lat, item.lng], 14, { duration: 1.5 });
                    marker.openPopup();
                });

                companyListEl.appendChild(li);

                // 创建地图标记
                const marker = L.marker([item.lat, item.lng], {
                    icon: L.divIcon({
                        className: 'custom-div-icon',
                        html: "<div style='background-color:#3b82f6; width:12px; height:12px; border-radius:50%; border:2px solid white; box-shadow:0 0 0 2px #3b82f6;'></div>",
                        iconSize: [16, 16],
                        iconAnchor: [8, 8]
                    })
                }).addTo(map);
                
                const popupContent = `
                    <div class="p-1">
                        <h3 class="font-bold text-gray-800 mb-2 text-sm border-b pb-2">${item.name}</h3>
                        ${item.address ? `<p class="text-xs text-gray-500 mb-3 flex items-start"><i class="fa-solid fa-location-dot mt-0.5 mr-1.5 text-blue-500"></i>${item.address}</p>` : ''}
                        <div>
                            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-wide mb-1.5">监测因子</p>
                            <div class="flex flex-wrap gap-1">
                                ${item.pollutants.map(p => `<span class="pollutant-tag tag-${p}">${p}</span>`).join('')}
                            </div>
                        </div>
                    </div>
                `;
                
                marker.bindPopup(popupContent, { className: 'custom-popup', maxWidth: 300 });
                markers.push(marker);
            });
        }

        renderList(rawData);

        // 搜索功能
        document.getElementById('search-input').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = rawData.filter(item => item.name.toLowerCase().includes(term));
            renderList(filtered);
        });

        // 移动端微信弹窗逻辑
        document.getElementById('mobile-wechat-btn').addEventListener('click', function(e) {
            e.stopPropagation();
            document.getElementById('mobile-qrcode-popup').classList.remove('hidden');
        });

        // 点击背景关闭弹窗
        document.getElementById('mobile-qrcode-popup').addEventListener('click', function(e) {
            if (e.target === this) {
                this.classList.add('hidden');
            }
        });

    </script>
    <style>
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .animate-slide-up {
            animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
    </style>
</body>
</html>
